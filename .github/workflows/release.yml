name: Release

# Trusted Publishing (OIDC) to PyPI — no long-lived tokens anywhere.
# Trigger: push a version tag (v1.2.3). The tag must match pyproject.toml.
# One-time setup: PyPI → Publishing → add pending publisher for project
# "finefettle" (owner MilindGaharwar, repo fettle, workflow release.yml,
# environment pypi).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $VER"
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install --quiet pytest ruff==0.15.20 semgrep==1.168.0 pyyaml
          python -m pytest tests/ -q

      - name: Build sdist + wheel
        run: |
          python -m pip install --quiet build
          python -m build

      - name: Smoke-test wheel (console script, version, bundled rules)
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --quiet dist/*.whl
          /tmp/smoke/bin/fettle --version
          /tmp/smoke/bin/python -c "from fettle._resources import rules_dir; d = rules_dir(); assert d.is_dir() and any(d.glob('*.yml')), d"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/finefettle
    permissions:
      id-token: write   # OIDC — this is the whole credential story
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
